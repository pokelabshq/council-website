<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Summarize API</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#0a0a0f;color:#e0e0e0;display:flex;align-items:center;min-height:100vh;justify-content:center}.c{max-width:640px;padding:40px 20px}h1{font-size:2.5em;background:linear-gradient(135deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}p{color:#888;margin:12px 0 24px}textarea{width:100%;background:#141422;border:1px solid #2a2a4a;border-radius:8px;padding:12px;color:#e0e0e0;font-family:monospace;font-size:.9em;min-height:140px;resize:vertical}button{background:linear-gradient(135deg,#00d4ff,#7b2ff7);color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:1em;cursor:pointer;margin-top:16px;width:100%}#r{margin-top:16px;background:#141422;border:1px solid #2a2a4a;border-radius:8px;padding:16px;white-space:pre-wrap;font-family:monospace;font-size:.85em;color:#c0c0c0}</style></head><body>
<div class="c"><h1>Summarize API</h1><p>Paste text, get a summary. 3 free per day, then x402 USDC.</p>
<textarea id="x">Artificial intelligence is intelligence demonstrated by machines, as opposed to natural intelligence displayed by animals including humans. AI research has been defined as the field of study of intelligent agents, which refers to any system that perceives its environment and takes actions that maximize its chance of achieving its goals. Machine learning is a subset of AI focused on pattern recognition from data. Deep learning uses neural networks with multiple layers to model complex patterns.</textarea>
<button onclick="s()">Summarize</button>
<div id="r">Result will appear here...</div>
</div>
<script>async function s(){const t=document.getElementById("x").value;const r=document.getElementById("r");r.textContent="Loading...";try{const d=await(await fetch("/api/summarize",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:t,sentences:3})})).json();r.textContent=d.error?"Error: "+d.error:JSON.stringify(d,null,2)}catch(e){r.textContent="Error: "+e.message}}</script></body></html>
