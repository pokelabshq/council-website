version: "3.8"
services:
  link-preview:
    build: ./services/link-preview
    ports: ["8765:8765"]
    restart: unless-stopped
  pokelabs-site:
    build: ./services/pokelabs-site
    ports: ["8766:8766"]
    restart: unless-stopped
  poke-bot:
    build: ./services/poke-bot
    ports: ["8770:8770"]
    restart: unless-stopped
  discord-bot:
    build: ./services/discord-bot
    ports: ["8775:8775"]
    restart: unless-stopped
  telegram-bot:
    build: ./services/telegram-bot
    ports: ["8777:8777"]
    restart: unless-stopped
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT=${TELEGRAM_CHAT:-}
  skills-hub:
    build: ./services/skills-hub
    ports: ["8780:8780"]
    restart: unless-stopped
  pricing-api:
    build: ./services/pricing-api
    ports: ["8790:8790"]
    restart: unless-stopped
